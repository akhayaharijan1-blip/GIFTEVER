<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | GIFTEVER</title>

    <link rel="icon" href="favicon.png">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#0b0b0b;
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            text-align:center;
            padding:20px;
        }

        .container{
            max-width:600px;
        }

        h1{
            font-size:90px;
            color:#d4af37;
            margin-bottom:10px;
        }

        h2{
            font-size:32px;
            margin-bottom:20px;
        }

        p{
            color:#bdbdbd;
            line-height:1.6;
            margin-bottom:35px;
        }

        a{
            display:inline-block;
            background:#d4af37;
            color:#000;
            text-decoration:none;
            padding:14px 32px;
            border-radius:8px;
            font-weight:bold;
            transition:.3s;
        }

        a:hover{
            background:#fff;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>404</h1>

    <h2>Oops! Page Not Found</h2>

    <p>
        The page you're looking for doesn't exist or may have been moved.
    </p>

    <a href="/">Back to Home</a>

</div>

</body>
</html>
